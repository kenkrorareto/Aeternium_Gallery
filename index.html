<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="css/gallery.css">
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <link href='https://fonts.googleapis.com/css?family=MedievalSharp' rel='stylesheet'>
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🖼️</text></svg>">
    <title>Galería de personajes</title>
</head>

<body>

    <header class="page-header">
        <h1 class="page-title">Galería de Personajes</h1>

        <div class="toolbar" role="search">
            <input id="search" class="search-input" type="search" placeholder="Buscar personaje…"
                autocomplete="off" spellcheck="false" aria-label="Buscar personaje por nombre">

            <label class="sort-field">
                <span>Orden</span>
                <select id="sort" class="sort-select" aria-label="Ordenar personajes">
                    <option value="asc">A → Z</option>
                    <option value="desc">Z → A</option>
                </select>
            </label>
        </div>

        <div id="filters" class="filters" role="group" aria-label="Filtrar por inicial"></div>

        <p id="result-count" class="result-count" aria-live="polite"></p>
    </header>

    <div id="gallery" class="centered-image"></div>

    <p id="no-results" class="no-results" hidden>No se encontraron personajes.</p>

    <script src="js/script.js"></script>
</body>

</html>
